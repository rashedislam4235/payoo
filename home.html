<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- taiwind + daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


<!-- icons --> 

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- css style -->
<style>
 * {
    
  font-family: "Outfit", sans-serif;
  
}
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
<!-- header section -->
   <header class=" border-b-2 border-gray-200 mb-8 sticky z-10 top-0 ">
    <section class="flex justify-between w-11/12 mx-auto  items-center py-3">

        <!-- left div -->
        <div class="left flex gap-2">
             <!-- header logo -->
            <div class="logo w-[60px]">
               <img class="w-full" src="./assets/logo.png" alt="">
                
            </div>
            <div class="">
                <h1  class="text-[2rem] font-extrabold text-[#080808]">$<span id="balance">45000</span></h1>
                <p class="text-[0.9rem] text-[#080808] opacity-[50%]">Available Balance</p>
            </div>

        </div>
        <!-- right div -->
         <div class="right">
            <a href="./index.html" class="btn btn-soft"><span class="text-black mr-1 inline-block rotate-180"><i class="fa-solid fa-arrow-right-from-bracket">   </i></span>Log Out</a>

           
         </div>
    </section>
   </header>

   <section class="">
   <div class="w-11/12 mx-auto mb-[24px]">
     <h1 class="text-2xl text-[#080808] font-bold mb-3">Welcome to Pay<span class="text-2xl text-[#7460FF] font-bold">oo</span></h1>
    <p class="text-[1rem] text-[#080808] opacity-[50%] ">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
   </div>
   </section>

   <!-- hero section -->
    <section class="mb-[102px]">

        <!-- hero container -->
       <div class=" container grid grid-cols-3 gap-[16px] w-11/12 mx-auto rounded-lg ">

         <button onclick="showOnly('add-money')" class="  flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-1.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">add Money</h3>
        </button>
         <button onclick="showOnly('cashout')" class=" flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-2.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Cashout</h3>
        </button>
         <button onclick="showOnly('trasfer-money')" class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-3.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%] whitespace-nowrap">Transfer Money</h3>
        </button>
         <button onclick="showOnly('bonus')" class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-4.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%] ">Get Bonus</h3>
        </button>
         <button onclick="showOnly('pay-bill')" class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-5.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Pay Bill</h3>
        </button>
         <button onclick="showOnly('transaction')" class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-6.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Transactions</h3>
        </button>
        
       </div>


       

    </section>
    
    <!-- cashout section -->
        <section id="cashout" class="pb-[132px] hidden">
    
            <div class="container w-11/12 mx-auto ">
                <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Cash Out</h1>
                <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">
     
    
      <label class="label text-[#080808] text-[1rem] font-medium
      ">Agent Number</label>
      <input id="input-Agent-Number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Agent number"/>
      <br>
      <label class="label text-[#080808] text-[1rem] font-medium
      ">Amount</label>
      <input id="input-amount" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Amount"/>
      <br>
    
      <label class="label text-[#080808] text-[1rem] font-medium
      "> Pin number</label>
      <input id="pin" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />
    
      <button id="cash-out-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Withdraw Money</button>
    </fieldset>
    
    
    
            </div>
    
    
        </section>




        <!-- bonus section -->


         <section id="bonus" class="pb-[132px] hidden">
    
            <div class="container w-11/12 mx-auto ">
                <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Get Bonus</h1>
                <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">
     
    
      <label class="label text-[#080808] text-[1rem] font-medium
      ">Enter Bonus Coupon</label>
      <input id="coupon-input" maxlength="7" minlength="7" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your coupon"/>
      <br>
      
    
      <button id="get-bonus-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Get Bonus</button>
    </fieldset>
    
    
    
            </div>
    
    
        </section>





        <!-- transfer money section -->


         <section id="trasfer-money" class="pb-[132px] hidden ">
    
            <div class="container w-11/12 mx-auto ">
                <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Transfer Money</h1>
                <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">
     
    
      <label class="label text-[#080808] text-[1rem] font-medium
      ">User Account Number</label>
      <input id="input-userAccount-Number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter 11 digit number"/>
      <br>
      <label class="label text-[#080808] text-[1rem] font-medium
      ">Amount</label>
      <input id="input-transfer-amount" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter amount to transfer"/>
      <br>
    
      <label class="label text-[#080808] text-[1rem] font-medium
      "> Pin number</label>
      <input id="pin-for-transfer-money" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />
    
      <button id="transfer-money-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Send Now</button>
    </fieldset>
    
    
    
            </div>
    
    
        </section>







<!-- transection -->

        <section id="transaction" class="pb-[132px] hidden">
            <div id="transection-container-div" class="transection-container  w-11/12 mx-auto ">
                <h1  class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Transaction History</h1>

                <div id="no-history-found" class="text-center w-11/12 mx-auto bg-slate-400 rounded-[10px] p-7 ">
                    <h1 class="text-[1.5rem]">No History Found!</h1>
                </div>
               

            </div>
        </section>
    
    
    <!-- add money -->
    

      <section id="add-money"  class=" pb-[132px]">

        <div class="container w-11/12 mx-auto ">
            <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Add Money</h1>
            <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">


                 <label class="label text-[#080808] text-[1rem] font-medium
  ">Select A Bank</label>

                <select id="add-money-bank" class="select   border-none rounded-[32px] bg-base-200">
  <option disabled selected>Select back</option>
  <option>DBBL</option>
  <option>TBBL</option>
  <option>City Bank</option>
</select>  <br>
 

  <label class="label text-[#080808] text-[1rem] font-medium
  ">Bank Account Number</label>
  <input id="input-bank-account-Number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter 11 digit account number"/>
  <br>
  <label class="label text-[#080808] text-[1rem] font-medium
  ">Amount to Add</label>
  <input id="input-amountNumber" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Amount"/>
  <br>

  <label class="label text-[#080808] text-[1rem] font-medium
  "> Pin number</label>
  <input id="pinNumber" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />

  <button id="add-money-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Add Money</button>
</fieldset>



        </div>


    </section> 



    <!-- pay bill section -->



    <section" id="pay-bill"  class=" pb-[132px] hidden mb-4">

        <div class="container w-11/12 mx-auto ">
            <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Pay Bill</h1>
            <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">


                 <label class="label text-[#080808] text-[1rem] font-medium
  ">Select to Pay</label>

                <select id="add-momey-bill" class="select   border-none rounded-[32px] bg-base-200">
  <option disabled selected>Select back</option>
  <option>DBBL</option>
  <option>TBBL</option>
  <option>City Bank</option>
</select>  <br>
 

  <label class="label text-[#080808] text-[1rem] font-medium
  ">Biller Account Number</label>
  <input id="input-bank-account-Number-pay" maxlength="11" minlength="11"  type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter 11 digit account number"/>
  <br>
  <label class="label text-[#080808] text-[1rem] font-medium
  ">Amount to Pay</label>
  <input id="input-amount-payNumber-pay" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Add Amount to pay"/>
  <br>

  <label class="label text-[#080808] text-[1rem] font-medium
  "> Pin number</label>
  <input id="pinNumber-pay" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />

  <button id="pay-bill-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Pay Now</button>
</fieldset>



        </div>


    </section>

<img src="./assets/opt-1.png" alt="">
   


   


    <script src="./machine.js"></script>
    <script src="./add-money.js"></script>
    <script src="./cash-out.js"></script>
    <script src="./pay-bill.js"></script>
    <script src="./transfer-money.js"></script>
    <script src="./bonus.js"></script>


    



</body>
</html>
