<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- taiwind + daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


<!-- icons --> 

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- css style -->
<style>
 * {
    
  font-family: "Outfit", sans-serif;
  
}
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
<!-- header section -->
   <header class=" border-b-2 border-gray-200 mb-8 sticky z-10 top-0 ">
    <section class="flex justify-between w-11/12 mx-auto  items-center py-3">

        <!-- left div -->
        <div class="left flex gap-2">
             <!-- header logo -->
            <div class="logo w-[60px]">
               <img class="w-full" src="./assets/logo.png" alt="">
                
            </div>
            <div class="">
                <h1  class="text-[2rem] font-extrabold text-[#080808]">$<span id="balance">45000</span></h1>
                <p class="text-[0.9rem] text-[#080808] opacity-[50%]">Available Balance</p>
            </div>

        </div>
        <!-- right div -->
         <div class="right">
            <a href="./index.html" class="btn btn-soft"><span class="text-black mr-1 inline-block rotate-180"><i class="fa-solid fa-arrow-right-from-bracket">   </i></span>Log Out</a>

           
         </div>
    </section>
   </header>

   <section class="">
   <div class="w-11/12 mx-auto mb-[24px]">
     <h1 class="text-2xl text-[#080808] font-bold mb-3">Welcome to Pay<span class="text-2xl text-[#7460FF] font-bold">oo</span></h1>
    <p class="text-[1rem] text-[#080808] opacity-[50%] ">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
   </div>
   </section>

   <!-- hero section -->
    <section class="mb-[102px]">

        <!-- hero container -->
       <div class=" container grid grid-cols-3 gap-[16px] w-11/12 mx-auto rounded-lg ">

         <button class="  flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-1.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">add Money</h3>
        </button>
         <button class=" flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-2.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Cashout</h3>
        </button>
         <button class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-3.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%] whitespace-nowrap">Transfer Money</h3>
        </button>
         <button class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-4.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%] ">Get Bonus</h3>
        </button>
         <button class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft ">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-5.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Pay Bill</h3>
        </button>
         <button class="flex-col h-full py-5 px-6  rounded-[12px] btn btn-soft">

          <div class="w-[24px] mx-auto mb-2">  <img  src="./assets/opt-6.png" alt=""></div>
            <h3 class="text-[14px] text-[#080808] opacity-[70%]">Transactions</h3>
        </button>
        
       </div>


       

    </section>

<!-- add money section  -->
    <section>

        <div class="container w-11/12 mx-auto ">
            <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Cash Out</h1>
            <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">
 

  <label class="label text-[#080808] text-[1rem] font-medium
  ">Agent Number</label>
  <input id="input-Agent-Number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Agent number"/>
  <br>
  <label class="label text-[#080808] text-[1rem] font-medium
  ">Amount</label>
  <input id="input-amount" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Amount"/>
  <br>

  <label class="label text-[#080808] text-[1rem] font-medium
  "> Pin number</label>
  <input id="pin" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />

  <button id="cash-out-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Withdraw Money</button>
</fieldset>



        </div>


    </section>


    <!-- cashout sectioon -->

    <section class="pb-[132px]">

      

        <!-- container -->

        <div class="container w-11/12 mx-auto ">
            <h1 class="text-[18px] font-semibold text-[#080808] mb-4 ml-5">Cash Out</h1>
            <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto  ">
 

  <label class="label text-[#080808] text-[1rem] font-medium
  ">Agent Number</label>
  <input id="input-Agent-Number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Agent number"/>
  <br>
  <label class="label text-[#080808] text-[1rem] font-medium
  ">Amount</label>
  <input id="input-amount" maxlength="11" minlength="11" type="number" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your Amount"/>
  <br>

  <label class="label text-[#080808] text-[1rem] font-medium
  "> Pin number</label>
  <input id="pin" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin Number" />

  <button id="cash-out-btn" class="btn rounded-[32px] bg-primary text-white mt-4">Withdraw Money</button>
</fieldset>



        </div>
    </section>


    <script src="./cash-out.js"></script>

</body>
</html>
