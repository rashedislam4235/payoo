<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- taiwind + daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


<!-- icons --> 

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- css style -->
<style>
 * {
    
  font-family: "Outfit", sans-serif;
  
}
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <!-- image -->
    <div class="logo w-[263px] mx-auto pt-52">
        <img src="./assets/Logo-full.png" alt="">

    </div>

    <!-- login form -->
    <section class="pt-8">
       
        <fieldset class="fieldset bg-base-100  rounded-[20px] w-[380px]   p-8 mx-auto">
 

  <label class="label text-[#080808] text-[1rem] font-medium
  ">Mobile Number</label>
  <input id="input-number" maxlength="11" minlength="11" type="text" class="input border-none rounded-[32px] bg-base-200" placeholder="Enter your number"/>
  <br>

  <label class="label text-[#080808] text-[1rem] font-medium
  ">4 Digit Pin</label>
  <input id="input-password" maxlength="4" minlength="4" type="password" class="input border-none rounded-[32px] bg-base-200 " placeholder="Enter 4 Digit Pin" />

  <button id="log-in" class="btn rounded-[32px] bg-primary text-white mt-4">Login</button>
</fieldset>

       


    </section>



    <script src="./login.js"></script>
    

    
  
</body>
</html>
